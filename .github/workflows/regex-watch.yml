name: Regex Watcher

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          fetch-depth: 1
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
      
      - name: Install virtual display buffers (Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          
      - name: Install Playwright browsers
        run: npx playwright install firefox
        
      - name: Cache Camoufox browser
        id: cache-camoufox
        uses: actions/cache@v4
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            camoufox-${{ runner.os }}-

      - name: Fetch Camoufox browser
        if: steps.cache-camoufox.outputs.cache-hit != 'true'
        run: npx camoufox-js fetch
        
      - name: Ensure logs folder exists
        run: mkdir -p logs
        
      - name: Run Regex scan
        env:
          REGEX_WEBHOOK: ${{ secrets.REGEX_WEBHOOK }}
        run: npm run regex
        
      - name: Commit results to master
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Configure git with token
          git config --global user.name "ModelWatcher"
          git config --global user.email "modelwatcher@github.com"
          
          # Save the new state before resetting
          cp logs/regex-state.json /tmp/regex-state-new.json 2>/dev/null || true
          
          # Fetch latest and reset
          git fetch origin master
          git reset --hard origin/master
          
          # Create logs dir and copy new state if we have one
          mkdir -p logs
          if [ -f /tmp/regex-state-new.json ]; then
            cp /tmp/regex-state-new.json logs/regex-state.json
          fi
          
          # Check if there are actual changes to commit
          if [ -f logs/regex-state.json ]; then
            ORIG_HASH=$(git show origin/master:logs/regex-state.json 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "empty")
            NEW_HASH=$(sha256sum logs/regex-state.json | cut -d' ' -f1)
            if [ "$ORIG_HASH" = "$NEW_HASH" ] && [ "$ORIG_HASH" != "empty" ]; then
              echo "No Regex changes detected - skipping commit"
              exit 0
            fi
          fi
          
          # Add and commit (only if there are changes)
          git add -f logs/regex-state.json || true
          if ! git diff --quiet --staged; then
            git commit -m "Update Regex state - $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin master
            echo "Updated Regex state on master branch"
          else
            echo "No changes to commit"
          fi
